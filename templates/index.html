<!DOCTYPE html>
<html>
<head>

<title>Smart Hospital Queue System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.title{
font-size:34px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
color:#38bdf8;
}

.card{
background:#1e293b;
border:none;
border-radius:15px;
}

.form-control{
background-color:#334155;
color:white;
border:1px solid #475569;
}

.form-control::placeholder{
color:#cbd5f5;
}

label{
color:#e2e8f0;
font-weight:500;
}

.table{
color:white;
}

.btn-custom{
background:#38bdf8;
border:none;
}

.btn-custom:hover{
background:#0ea5e9;
}

.counter{
font-size:28px;
font-weight:bold;
color:#22c55e;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="title">
🏥 Smart Hospital Queue Management System
</div>

<div class="row">

<!-- Patient Form -->
<div class="col-md-4">

<div class="card p-4">

<h4 class="mb-3">Register Patient</h4>

<form action="/add_patient" method="POST">

<div class="mb-3">
<label>Patient Name</label>
<input type="text" name="name" class="form-control" placeholder="Enter patient name" required>
</div>

<div class="mb-3">
<label>Patient Problem</label>
<input type="text" name="problem" class="form-control" placeholder="Describe problem" required>
</div>

<button class="btn btn-custom w-100">
Submit Patient
</button>

</form>

</div>

</div>


<!-- Dashboard -->
<div class="col-md-8">

<div class="card p-4 mb-4">

<h4>Hospital Crowd Detection</h4>

<div class="counter">
👥 {{ people }} People in Hospital
</div>

</div>


<div class="card p-4">

<h4 class="mb-3">Patient Queue</h4>

<table class="table table-dark table-hover">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Problem</th>
<th>Urgency</th>
<th>Queue</th>
</tr>

</thead>

<tbody>

{% for p in patients %}

<tr>

<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
<td>{{p[4]}}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</body>
</html>
